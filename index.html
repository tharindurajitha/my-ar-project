<a-marker type="pattern" url="marker.patt">

  <!-- ✅ PIVOT FIXED WRAPPER -->
  <a-entity class="shaftPivot">

    <!-- SHAFT MODEL -->
    <a-entity id="shaft"
              gltf-model="#crank"
              scale="0.5 0.5 0.5"
              rotation="-90 0 0">
    </a-entity>

    <!-- ARROW -->
    <a-entity id="arrow"
              gltf-model="#arrowModel"
              scale="0.2 0.2 0.2"
              position="0 0 1.5">
    </a-entity>

  </a-entity>

</a-marker>
