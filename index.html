<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    #uiButton {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      font-size: 16px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      z-index: 999;
    }
  </style>
</head>

<body style="margin:0; overflow:hidden;">

<button id="uiButton">Reverse Rotation</button>

<a-scene embedded arjs="sourceType: webcam;" vr-mode-ui="enabled:false">

  <a-light type="ambient" intensity="1"></a-light>

  <a-assets>
    <a-asset-item id="crank" src="crankshaft.glb"></a-asset-item>
    <a-asset-item id="solid" src="solidshaft.glb"></a-asset-item>
    <a-asset-item id="arrowModel" src="arrow.glb"></a-asset-item>
  </a-assets>

  <!-- MARKER -->
  <a-marker type="pattern" url="marker.patt">

    <!-- SHAFT -->
    <a-entity id="shaft" gltf-model="#crank"
              position="0 0.5 0"
              scale="0.5 0.5 0.5"
              rotation="-90 0 0">
    </a-entity>

    <!-- ARROWS (FLOW EFFECT) -->
    <a-entity id="arrow1" gltf-model="#arrowModel"
              position="0 0 2"
              scale="0.2 0.2 0.2"></a-entity>

    <a-entity id="arrow2" gltf-model="#arrowModel"
              position="0 0 2.5"
              scale="0.2 0.2 0.2"></a-entity>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>
  let direction = 1;
  let angle = 0;

  document.getElementById("uiButton").addEventListener("click", () => {
    direction *= -1;
  });

  function animate() {
    angle += direction * 2;

    // ✅ SHAFT rotates ONLY on X axis
    const shaft = document.querySelector("#shaft");
    shaft.setAttribute("rotation", `${angle} 0 0`);

    // ✅ ARROW FLOW MOVEMENT (inwards/outwards)
    let t = (Math.sin(angle * 0.05) + 1) / 2; // 0 → 1 smooth loop

    document.querySelector("#arrow1")
      .setAttribute("position", `0 0 ${2 - t * 2}`);

    document.querySelector("#arrow2")
      .setAttribute("position", `0 0 ${2.5 - t * 2}`);

    requestAnimationFrame(animate);
  }

  animate();
</script>

</body>
</html>
