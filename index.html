<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    #uiButton {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      z-index: 999;
    }
  </style>

  <script>
    AFRAME.registerComponent('shaft-system', {
      init: function () {
        this.angle = 0;
        this.direction = 1;

        document.addEventListener("toggle", () => {
          this.direction *= -1;
        });

        this.arrow = null;
      },

      tick: function () {
        this.angle += this.direction * 2;

        // rotate shaft
        this.el.setAttribute("rotation", `${this.angle} 0 0`);

        // IMPORTANT: find arrow INSIDE marker every frame (AR.js safe way)
        if (!this.arrow) {
          this.arrow = this.el.querySelector(".arrow");
        }

        if (this.arrow) {
          let t = (Math.sin(this.angle * 0.05) + 1) / 2;
          this.arrow.setAttribute("position", `0 0 ${1.5 - t * 1.5}`);
        }
      }
    });
  </script>
</head>

<body style="margin:0; overflow:hidden;">

<button id="uiButton">Reverse Rotation</button>

<a-scene embedded arjs="sourceType: webcam;" vr-mode-ui="enabled:false">

  <a-light type="ambient" intensity="1"></a-light>

  <a-assets>
    <a-asset-item id="crank" src="crankshaft.glb"></a-asset-item>
    <a-asset-item id="arrowModel" src="arrow.glb"></a-asset-item>
  </a-assets>

  <!-- MARKER -->
  <a-marker type="pattern" url="marker.patt">

    <a-entity shaft-system>

      <a-entity gltf-model="#crank"
                scale="0.5 0.5 0.5"
                rotation="-90 0 0"></a-entity>

      <a-entity class="arrow"
                gltf-model="#arrowModel"
                scale="0.2 0.2 0.2"
                position="0 0 1.5"></a-entity>

    </a-entity>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>
document.getElementById("uiButton").addEventListener("click", () => {
  document.dispatchEvent(new Event("toggle"));
});
</script>

</body>
</html>
