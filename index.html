<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
      #uiButton {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 20px;
        font-size: 16px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        z-index: 999;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">

    <!-- UI BUTTON -->
    <button id="uiButton">Reverse X Rotation</button>

    <a-scene embedded arjs="sourceType: webcam;" vr-mode-ui="enabled: false">

      <!-- LIGHT -->
      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="2 4 2"></a-light>

      <!-- ASSETS -->
      <a-assets>
        <a-asset-item id="crank" src="crankshaft.glb"></a-asset-item>
        <a-asset-item id="solid" src="solidshaft.glb"></a-asset-item>
        <a-asset-item id="hollow" src="hollowshaft.glb"></a-asset-item>
        <a-asset-item id="stepped" src="steppedshaft.glb"></a-asset-item>
      </a-assets>

      <!-- ================= MARKER 1 ================= -->
      <a-marker type="pattern" url="marker.patt">
        <a-entity class="shaftWrapper"
          gltf-model="#crank"
          position="0 0.5 0"
          scale="0.5 0.5 0.5"
          rotation="-90 0 0">
        </a-entity>
      </a-marker>

      <!-- ================= MARKER 2 ================= -->
      <a-marker type="pattern" url="markersolidshaft.patt">
        <a-entity class="shaftWrapper"
          gltf-model="#solid"
          position="0 0.5 0"
          scale="0.2 0.2 0.2"
          rotation="-90 0 0">
        </a-entity>
      </a-marker>

      <!-- ================= MARKER 3 ================= -->
      <a-marker type="pattern" url="markerhollowshaft.patt">
        <a-entity class="shaftWrapper"
          gltf-model="#hollow"
          position="0 0.5 0"
          scale="0.2 0.2 0.2"
          rotation="-90 0 0">
        </a-entity>
      </a-marker>

      <!-- ================= MARKER 4 ================= -->
      <a-marker type="pattern" url="markersteppedshaft.patt">
        <a-entity class="shaftWrapper"
          gltf-model="#stepped"
          position="0 0.5 0"
          scale="0.2 0.2 0.2"
          rotation="-90 0 0">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>

    </a-scene>

    <!-- ================= JS CONTROL ================= -->
    <script>
      let direction = 1;
      let angle = 0;

      const button = document.getElementById("uiButton");

      button.addEventListener("click", () => {
        direction *= -1;
      });

      function animate() {
        angle += direction * 2; // speed

        document.querySelectorAll(".shaftWrapper").forEach(obj => {
          obj.setAttribute("rotation", `${angle} 0 0`);
        });

        requestAnimationFrame(animate);
      }

      animate();
    </script>

  </body>
</html>
