<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <!-- Animation -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

    <style>
      /* UI BUTTON STYLE */
      #uiButton {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 15px 25px;
        font-size: 16px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 10px;
        z-index: 999;
        cursor: pointer;
      }
    </style>
  </head>

  <body style="margin: 0; overflow: hidden;">

    <!-- UI BUTTON -->
    <button id="uiButton">Reverse Rotation</button>

    <a-scene embedded arjs="sourceType: webcam;" vr-mode-ui="enabled: false">

      <!-- LIGHT -->
      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="2 4 2"></a-light>

      <!-- ASSETS -->
      <a-assets>
        <a-asset-item id="crank" src="crankshaft.glb"></a-asset-item>
        <a-asset-item id="solid" src="solidshaft.glb"></a-asset-item>
        <a-asset-item id="hollow" src="hollowshaft.glb"></a-asset-item>
        <a-asset-item id="stepped" src="steppedshaft.glb"></a-asset-item>
      </a-assets>

      <!-- CRANK -->
      <a-marker type="pattern" url="marker.patt">
        <a-entity class="shaft"
          gltf-model="#crank"
          position="0 0.5 0"
          scale="0.5 0.5 0.5"
          rotation="-90 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
        </a-entity>
      </a-marker>

      <!-- SOLID -->
      <a-marker type="pattern" url="markersolidshaft.patt">
        <a-entity class="shaft"
          gltf-model="#solid"
          position="0 0.5 0"
          scale="0.2 0.2 0.2"
          rotation="-90 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
        </a-entity>
      </a-marker>

      <!-- HOLLOW -->
      <a-marker type="pattern" url="markerhollowshaft.patt">
        <a-entity class="shaft"
          gltf-model="#hollow"
          position="0 0.5 0"
          scale="0.2 0.2 0.2"
          rotation="-90 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
        </a-entity>
      </a-marker>

      <!-- STEPPED -->
      <a-marker type="pattern" url="markersteppedshaft.patt">
        <a-entity class="shaft"
          gltf-model="#stepped"
          position="0 0.5 0"
          scale="0.2 0.2 0.2"
          rotation="-90 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>

    </a-scene>

    <!-- SCRIPT -->
    <script>
      let reversed = false;
      const button = document.getElementById("uiButton");

      button.addEventListener("click", () => {
        const shafts = document.querySelectorAll(".shaft");

        shafts.forEach(model => {
          if (!reversed) {
            model.setAttribute("animation",
              "property: rotation; to: 0 -360 0; loop: true; dur: 4000");
          } else {
            model.setAttribute("animation",
              "property: rotation; to: 0 360 0; loop: true; dur: 4000");
          }
        });

        reversed = !reversed;
      });
    </script>

  </body>
</html>
