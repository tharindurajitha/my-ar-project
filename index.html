<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GLB Model Test</title>

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">

    <a-scene>

      <!-- Lighting (important for visibility) -->
      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="2 4 2" intensity="1"></a-light>

      <!-- CAMERA -->
      <a-camera position="0 1.6 3"></a-camera>

      <!-- MODEL -->
      <a-entity
        gltf-model="crankshaft.glb"
        position="0 0 -2"
        scale="1 1 1"
        rotation="0 0 0">
      </a-entity>

    </a-scene>

  </body>
</html>
