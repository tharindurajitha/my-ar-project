<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />

    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden;">

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: true;">

      <!-- LIGHT -->
      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="2 4 2"></a-light>

      <!-- ASSETS -->
      <a-assets>
        <a-asset-item id="crank" src="crankshaft.glb"></a-asset-item>
        <a-asset-item id="solid" src="solidshaft.glb"></a-asset-item>
      </a-assets>

      <!-- MARKER 1 -->
      <a-marker type="pattern" url="marker.patt">
        <a-entity gltf-model="#crank"
                  position="0 0.5 0"
                  scale="0.5 0.5 0.5"
                  rotation="-90 0 0"
                  animation-mixer>
        </a-entity>
      </a-marker>

      <!-- MARKER 2 -->
      <a-marker type="pattern" url="markersolidshaft.patt">
        <a-entity gltf-model="#solid"
                  position="0 0.5 0"
                  scale="0.005 0.005 0.005"
                  rotation="-90 0 0"
                  animation-mixer>
        </a-entity>
      </a-marker>
      <a-entity camera></a-entity>

    </a-scene>

  </body>
</html>
